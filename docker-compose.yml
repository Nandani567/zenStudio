version: '3.8'

services:
  # --- BACKEND SERVICE ---
  backend:
    build: .
    ports:
      - "3001:3001"
    environment:
      - MONGO_URI=${MONGO_URI}
      - PORT=3001
    restart: always

  # --- FRONTEND SERVICE ---
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend # We'll create this next
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://localhost:3001
    depends_on:
      - backend